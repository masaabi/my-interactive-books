<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل رائد الأعمال | Liquid Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 10s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-3000 { animation-delay: 3s; }
        .animation-delay-4000 { animation-delay: 4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.6s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =============================================================
        // CONFIG — لا حاجة لمفتاح API، الاتصال يتم مباشرة عبر Claude
        // =============================================================
        const CONFIG = {
            MODEL: "claude-sonnet-4-6",
            // ⚠️ عدّل هذا الرابط بعد نشر الـ Worker على Cloudflare
            // شكل الرابط عادة: https://entrepreneur-guide-proxy.YOUR-SUBDOMAIN.workers.dev
            PROXY_URL: "https://entrepreneur-guide-proxy.YOUR-SUBDOMAIN.workers.dev",
        };

        // ── Claude API caller (عبر بروكسي Cloudflare Worker) ──
        const callClaudeAPI = async (userMessage, systemPrompt) => {
            if (!CONFIG.PROXY_URL || CONFIG.PROXY_URL.includes("YOUR-SUBDOMAIN")) {
                return "⚠️ لم يتم ضبط رابط الـ Worker بعد. عدّل PROXY_URL في أعلى الملف بعد نشر الـ Worker على Cloudflare.";
            }
            try {
                const res = await fetch(CONFIG.PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        max_tokens: 2048,
                        system: systemPrompt,
                        messages: [{ role: 'user', content: userMessage }],
                        tools: [{ type: "web_search_20250305", name: "web_search" }]
                    })
                });
                const data = await res.json();
                if (!res.ok) return `خطأ: ${data?.error?.message || res.status}`;
                const text = (data.content || [])
                    .map(item => (item.type === "text" ? item.text : ""))
                    .filter(Boolean)
                    .join("\n");
                return text || "عذراً، لم أستطع المعالجة حالياً.";
            } catch (e) { console.error(e); return "عذراً، حدث خطأ في الاتصال. تحقق من الإنترنت."; }
        };

        // ── Lucide Icon component (FIXED for v1.x) ──
        const toPascal = n => n.split('-').map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join('');
        const toCamel = k => k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
        const Icon = ({ name, size=24, className="", ...props }) => {
            const lib = window.lucide || {};
            const node = lib[toPascal(name)];
            if (!node || !Array.isArray(node)) return null;
            return React.createElement('svg', {
                xmlns:"http://www.w3.org/2000/svg", width:size, height:size,
                viewBox:"0 0 24 24", fill:"none", stroke:"currentColor",
                strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round",
                className, ...props
            }, node.map(([tag,attrs],i) => {
                const ra={}; for(const k in attrs) ra[toCamel(k)]=attrs[k];
                return React.createElement(tag,{key:i,...ra});
            }));
        };
        const Rocket=(p)=><Icon name="rocket" {...p}/>;const Users=(p)=><Icon name="users" {...p}/>;
        const DollarSign=(p)=><Icon name="dollar-sign" {...p}/>;const Target=(p)=><Icon name="target" {...p}/>;
        const TrendingUp=(p)=><Icon name="trending-up" {...p}/>;const Brain=(p)=><Icon name="brain" {...p}/>;
        const PenTool=(p)=><Icon name="pen-tool" {...p}/>;const Calculator=(p)=><Icon name="calculator" {...p}/>;
        const Lightbulb=(p)=><Icon name="lightbulb" {...p}/>;const Shield=(p)=><Icon name="shield" {...p}/>;
        const Heart=(p)=><Icon name="heart" {...p}/>;const ArrowDown=(p)=><Icon name="arrow-down" {...p}/>;
        const Menu=(p)=><Icon name="menu" {...p}/>;const X=(p)=><Icon name="x" {...p}/>;
        const Search=(p)=><Icon name="search" {...p}/>;const Layout=(p)=><Icon name="layout" {...p}/>;
        const RefreshCw=(p)=><Icon name="refresh-cw" {...p}/>;const Briefcase=(p)=><Icon name="briefcase" {...p}/>;
        const Battery=(p)=><Icon name="battery" {...p}/>;const BookOpen=(p)=><Icon name="book-open" {...p}/>;
        const Bot=(p)=><Icon name="bot" {...p}/>;const FileText=(p)=><Icon name="file-text" {...p}/>;
        const Frown=(p)=><Icon name="frown" {...p}/>;const Award=(p)=><Icon name="award" {...p}/>;
        const Flag=(p)=><Icon name="flag" {...p}/>;const Handshake=(p)=><Icon name="handshake" {...p}/>;
        const CheckCircle=(p)=><Icon name="check-circle" {...p}/>;const Quote=(p)=><Icon name="quote" {...p}/>;
        const Coins=(p)=><Icon name="coins" {...p}/>;const HelpCircle=(p)=><Icon name="help-circle" {...p}/>;
        const Calendar=(p)=><Icon name="calendar" {...p}/>;const Globe=(p)=><Icon name="globe" {...p}/>;
        const Zap=(p)=><Icon name="zap" {...p}/>;const Settings=(p)=><Icon name="settings" {...p}/>;
        const Star=(p)=><Icon name="star" {...p}/>;const Shuffle=(p)=><Icon name="shuffle" {...p}/>;
        const Activity=(p)=><Icon name="activity" {...p}/>;const List=(p)=><Icon name="list" {...p}/>;
        const GitMerge=(p)=><Icon name="git-merge" {...p}/>;const Ticket=(p)=><Icon name="ticket" {...p}/>;
        const PieChart=(p)=><Icon name="pie-chart" {...p}/>;const Send=(p)=><Icon name="send" {...p}/>;
        const Sparkles=(p)=><Icon name="sparkles" {...p}/>;const Copy=(p)=><Icon name="copy" {...p}/>;
        const Check=(p)=><Icon name="check" {...p}/>;const Stethoscope=(p)=><Icon name="stethoscope" {...p}/>;
        const ListCheck=(p)=><Icon name="list-check" {...p}/>;const Cpu=(p)=><Icon name="cpu" {...p}/>;
        const Microscope=(p)=><Icon name="microscope" {...p}/>;const AlertOctagon=(p)=><Icon name="alert-octagon" {...p}/>;
        const Wrench=(p)=><Icon name="wrench" {...p}/>;const ArrowRight=(p)=><Icon name="arrow-right" {...p}/>;
        const Eye=(p)=><Icon name="eye" {...p}/>;const GanttChartSquare=(p)=><Icon name="gantt-chart-square" {...p}/>;
        const Type=(p)=><Icon name="type" {...p}/>;const ExternalLink=(p)=><Icon name="external-link" {...p}/>;

        // ── Base Components ──
        const BackgroundBlobs = () => (
        <div className="fixed inset-0 -z-10 overflow-hidden bg-slate-900">
            <div className="absolute top-0 left-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
            <div className="absolute top-0 right-0 w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
            <div className="absolute -bottom-32 left-20 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
            <div className="absolute bottom-0 right-20 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-3000"></div>
        </div>
        );
        const GlassCard = ({ children, className="", hoverEffect=false }) => (
        <div className={`bg-white/10 backdrop-blur-lg border border-white/20 shadow-xl rounded-2xl p-6 text-white ${hoverEffect?'transition-transform duration-300 hover:scale-[1.02] hover:bg-white/15':''} ${className}`}>{children}</div>
        );
        const ChapterSummary = ({ points }) => (
        <div className="mb-8 bg-white/5 border border-white/10 rounded-xl p-5 backdrop-blur-sm">
            <h4 className="text-cyan-400 font-bold mb-3 flex items-center gap-2 text-sm"><ListCheck size={18}/> خلاصة المرحلة</h4>
            <ul className="space-y-2">{points.map((p,i)=>(<li key={i} className="flex items-start gap-2 text-sm text-slate-300"><span className="text-cyan-500 mt-1">•</span><span>{p}</span></li>))}</ul>
        </div>
        );

        // ── AI Chat Components ──
        const SmartAIAdvisor = () => {
            const [selectedTool, setSelectedTool] = useState(null);
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const [copiedIndex, setCopiedIndex] = useState(null);
            const chatEndRef = useRef(null);
            const tools = [
                { id:1, name:"مستكشف الفرص", icon:<Globe size={24} className="text-blue-400"/>, desc:"هل تبحث عن 'مساحة بيضاء' أو فرصة غير مستغلة؟", prompt:"أنت مستشار ابتكار استراتيجي. مهمتك هي تحليل المدخلات للبحث عن 'المساحات البيضاء' والفرص غير المستغلة في السوق. قدم أفكاراً مبتكرة وغير تقليدية." },
                { id:2, name:"محلل توقيت السوق", icon:<Calendar size={24} className="text-purple-400"/>, desc:"هل الآن هو الوقت المناسب لإطلاق مشروعك؟", prompt:"أنت خبير في تحليل توقيت الأسواق. قم بتحليل الفكرة بناءً على نضج التكنولوجيا، سلوك المستهلك، والمنافسة." },
                { id:3, name:"مساعد نموذج العمل", icon:<Layout size={24} className="text-green-400"/>, desc:"املأ الأقسام التسعة لمخطط نموذج العمل.", prompt:"أنت خبير في تصميم نماذج الأعمال (Business Model Canvas). ساعد المستخدم في ملء الأحجار التسعة للمخطط." },
                { id:4, name:"مختبر التحليل الاستراتيجي", icon:<Microscope size={24} className="text-cyan-400"/>, desc:"تحليل SWOT أو PESTEL لفكرتك.", prompt:"أنت محلل استراتيجي. قم بإجراء تحليل SWOT أو PESTEL للفكرة المدخلة." },
                { id:5, name:"مستشار القرارات الصعبة", icon:<Activity size={24} className="text-red-400"/>, desc:"تحليل القرارات القيادية الصعبة.", prompt:"أنت مستشار قيادي. ساعد في تحليل القرار الصعب باستخدام أطر مثل Cost-Benefit أو Regret Minimization." },
                { id:6, name:"مستشار الصحة النفسية", icon:<Brain size={24} className="text-pink-400"/>, desc:"استراتيجيات للتعامل مع ضغوط التأسيس.", prompt:"أنت مدرب صحة نفسية لرواد الأعمال. قدم استراتيجيات عملية للتعامل مع الضغط والإرهاق." },
                { id:7, name:"محلل مخاطر الفشل", icon:<AlertOctagon size={24} className="text-orange-400"/>, desc:"اعرف أهم المخاطر التي قد تواجهك.", prompt:"أنت خبير إدارة مخاطر. حدد أهم 5 أسباب قد تؤدي لفشل المشروع واقترح خططاً لتجنبها." },
                { id:8, name:"خبير الأدوات", icon:<Wrench size={24} className="text-yellow-400"/>, desc:"اقتراح أفضل الأدوات التقنية لمهمتك.", prompt:"أنت خبير في الأدوات التقنية (SaaS). اقترح أفضل Tech Stack بأعلى كفاءة وأقل تكلفة." },
            ];
            useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
            useEffect(()=>{if(selectedTool)setMessages([{role:'model',text:`أهلاً بك في ${selectedTool.name}. ${selectedTool.desc}\n\nصف لي فكرتك أو سؤالك.`}]);},[selectedTool]);
            const handleCopy=(text,idx)=>{try{navigator.clipboard?navigator.clipboard.writeText(text):(() => {const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);})();}catch(e){}setCopiedIndex(idx);setTimeout(()=>setCopiedIndex(null),2000);};
            const handleSend = async () => {
                if (!input.trim()||loading) return;
                const userMsg=input; setMessages(p=>[...p,{role:'user',text:userMsg}]); setInput(""); setLoading(true);
                const sp=`${selectedTool.prompt}\n\nتعليمات التنسيق:\n1. استخدم العناوين والقوائم النقطية.\n2. اجعل الإجابة مركزة وعملية.\n3. استخدم البحث عبر الإنترنت إن لزم.\n4. اكتب الأرقام بالصيغة اللاتينية (0-9).`;
                const r=await callClaudeAPI(userMsg,sp); setLoading(false); setMessages(p=>[...p,{role:'model',text:r}]);
            };
            return (
                <div className="space-y-6">
                    {!selectedTool ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-slideUp">
                            <div className="col-span-1 md:col-span-2 lg:col-span-4 mb-4">
                                <h3 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 flex items-center gap-2"><Sparkles className="text-yellow-400"/> مركز المستشار الذكي</h3>
                                <p className="text-slate-400 text-sm mt-2">اختر الأداة المناسبة لاحتياجك الحالي.</p>
                            </div>
                            {tools.map(tool=>(
                                <button key={tool.id} onClick={()=>setSelectedTool(tool)} className="bg-white/5 border border-white/10 p-5 rounded-2xl hover:bg-white/10 hover:border-cyan-500/50 hover:-translate-y-1 transition-all text-right group flex flex-col h-full shadow-lg">
                                    <div className="mb-4 bg-gradient-to-br from-white/10 to-transparent p-3 rounded-xl w-fit group-hover:scale-110 transition-transform shadow-inner border border-white/5">{tool.icon}</div>
                                    <h4 className="text-white font-bold text-base mb-2 group-hover:text-cyan-400 transition-colors">{tool.name}</h4>
                                    <p className="text-xs text-slate-400 leading-relaxed">{tool.desc}</p>
                                </button>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-black/40 border border-white/10 rounded-2xl overflow-hidden backdrop-blur-xl animate-fadeIn flex flex-col h-[600px] shadow-2xl">
                            <div className="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-cyan-500/20 rounded-lg text-cyan-400 border border-cyan-500/30">{selectedTool.icon}</div>
                                    <div><h4 className="text-white font-bold text-sm md:text-base">{selectedTool.name}</h4><span className="text-[10px] text-slate-400 hidden md:inline-block">مدعوم بـ Claude AI</span></div>
                                </div>
                                <button onClick={()=>setSelectedTool(null)} className="flex items-center gap-1 text-slate-400 hover:text-white text-xs px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">العودة للأدوات <ArrowRight size={14}/></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar bg-gradient-to-b from-transparent to-black/20">
                                {messages.map((msg,idx)=>(
                                    <div key={idx} className={`flex ${msg.role==='user'?'justify-end':'justify-start'}`}>
                                        <div className={`relative max-w-[85%] md:max-w-[75%] p-4 rounded-2xl text-sm leading-7 whitespace-pre-wrap ${msg.role==='user'?'bg-cyan-600 text-white rounded-br-sm shadow-lg':'bg-white/10 text-slate-100 rounded-bl-sm border border-white/5 shadow-md'}`}>
                                            {msg.text}
                                            {msg.role==='model'&&<button onClick={()=>handleCopy(msg.text,idx)} className="absolute -bottom-7 left-0 flex items-center gap-1.5 text-[10px] text-slate-500 hover:text-cyan-400 transition-colors px-2 py-1">{copiedIndex===idx?<Check size={12}/>:<Copy size={12}/>}{copiedIndex===idx?"تم النسخ":"نسخ الإجابة"}</button>}
                                        </div>
                                    </div>
                                ))}
                                {loading&&<div className="flex justify-start"><div className="bg-white/5 p-4 rounded-2xl rounded-bl-sm flex items-center gap-2 border border-white/5"><div className="flex gap-1"><span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce"></span><span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce delay-100"></span><span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce delay-200"></span></div><span className="text-xs text-slate-400">جاري التفكير والبحث...</span></div></div>}
                                <div ref={chatEndRef}/>
                            </div>
                            <div className="p-4 bg-white/5 border-t border-white/10">
                                <div className="relative flex gap-2">
                                    <textarea className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white text-sm focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder-slate-500 resize-none" rows="1" placeholder="اكتب هنا..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}}}/>
                                    <button onClick={handleSend} disabled={loading||!input.trim()} className={`absolute left-2 bottom-2 p-2 rounded-lg transition-all ${input.trim()&&!loading?'bg-cyan-500 text-white hover:bg-cyan-400 shadow-lg':'bg-white/10 text-slate-500 cursor-not-allowed'}`}><Send size={16}/></button>
                                </div>
                                <p className="text-[10px] text-center text-slate-600 mt-2">الذكاء الاصطناعي قد يخطئ. تأكد دائماً من المعلومات الهامة.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChapterChatBot = ({ chapterTitle, contentData }) => {
        const [messages,setMessages]=useState([{type:'bot',text:`مرحباً بك في المساعد الذكي لمرحلة "${chapterTitle}". اسألني أي شيء!`}]);
        const [inputValue,setInputValue]=useState("");const [isTyping,setIsTyping]=useState(false);const [copiedIndex,setCopiedIndex]=useState(null);const chatEndRef=useRef(null);
        useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
        const handleCopy=(text,index)=>{try{navigator.clipboard?navigator.clipboard.writeText(text):(() => {const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);})();}catch(e){}setCopiedIndex(index);setTimeout(()=>setCopiedIndex(null),2000);};
        const handleSend=async()=>{
            if(!inputValue.trim()||isTyping)return;const um=inputValue;setMessages(p=>[...p,{type:'user',text:um}]);setInputValue("");setIsTyping(true);
            const sp=`أنت مساعد ذكي ومستشار لرائد أعمال. الموضوع: "${chapterTitle}". السياق: "${contentData}".\nتعليمات: استخدم بحث Google للمعلومات الحديثة. استخدم العناوين والقوائم النقطية. كن مهنياً ومباشراً. اكتب الأرقام بالصيغة اللاتينية.`;
            const r=await callClaudeAPI(um,sp);setIsTyping(false);setMessages(p=>[...p,{type:'bot',text:r}]);
        };
        return (
            <div className="mt-8 border border-white/10 rounded-2xl overflow-hidden bg-black/20 backdrop-blur-md flex flex-col h-[500px]">
            <div className="p-4 bg-gradient-to-r from-cyan-900/40 to-blue-900/40 border-b border-white/10 flex items-center gap-2 flex-shrink-0"><Sparkles className="text-cyan-400" size={20}/><h4 className="font-bold text-white text-sm">المساعد الذكي - {chapterTitle}</h4></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-gradient-to-b from-transparent to-black/20">
                {messages.map((msg,idx)=>(<div key={idx} className={`flex ${msg.type==='user'?'justify-end':'justify-start'}`}><div className={`relative max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap ${msg.type==='user'?'bg-cyan-600 text-white rounded-br-sm shadow-lg':'bg-white/10 text-slate-100 rounded-bl-sm border border-white/5'}`}>{msg.text}{msg.type==='bot'&&<div className="absolute -bottom-6 left-0 flex gap-2"><button onClick={()=>handleCopy(msg.text,idx)} className="flex items-center gap-1 text-[10px] text-slate-400 hover:text-cyan-400 transition-colors bg-black/30 px-2 py-1 rounded-full border border-white/5">{copiedIndex===idx?<Check size={12}/>:<Copy size={12}/>}{copiedIndex===idx?"تم النسخ":"نسخ"}</button></div>}</div></div>))}
                {isTyping&&<div className="flex justify-start"><div className="bg-white/10 p-4 rounded-2xl rounded-bl-sm flex gap-1.5 items-center border border-white/5"><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"></span><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce delay-100"></span><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce delay-200"></span><span className="text-xs text-slate-400 mr-2">جاري البحث...</span></div></div>}
                <div ref={chatEndRef}/>
            </div>
